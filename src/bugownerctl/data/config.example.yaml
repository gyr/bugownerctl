# Example configuration for bugownerctl
# This file is bundled with the bugownerctl package as a template
#
# Copy this file to one of:
#   - ./validate_maintainership.yaml (project-local)
#   - ~/.config/bugownerctl/config.yaml (user config, recommended)
#   - /etc/bugownerctl/config.yaml (system-wide)
#
# Or use: bugownerctl init [--location user|local|system]

# SLFO git repository URL
# REQUIRED: Update for your environment
slfo_git_url: gitea@src.suse.de:products/SLFO.git

# Cache directory for downloads, clones, persistent data
# Optional: defaults to ~/.cache/bugownerctl
# cache_dir: ~/.cache/bugownerctl

# TLS certificate verification for repo-metadata downloads
# Optional: defaults to true (uses system/certifi trust store; honors REQUESTS_CA_BUNDLE)
#   true   -> verify with default trust store
#   false  -> disable verification (insecure; emits an InsecureRequestWarning)
#   <path> -> use a specific CA bundle, e.g. /etc/ssl/ca-bundle.pem (SUSE internal CA)
# Note: an empty or null value (e.g. `verify:` with nothing after it) is rejected
#   with a ConfigError, to enforce explicit bool or path-string configuration.
# verify: /etc/ssl/ca-bundle.pem

# Product versions to validate
# REQUIRED: Update with versions you need to test
products:
  - version: "16.0"
    commit: 9d679ed  # Specific commit for reproducibility

  - version: "16.1"
    branch: slfo-main  # Track latest main branch
