# GitLab CI/CD Pipeline
# Mirrors the GitHub CI workflow with quality checks and tests

image: python:3.12

# Define pipeline stages
stages:
  - quality
  - test

# Cache uv and Python packages for faster builds
variables:
  UV_CACHE_DIR: .cache/uv
  PIP_CACHE_DIR: .cache/pip

cache:
  paths:
    - .cache/uv
    - .cache/pip
    - .venv

# Install uv and dependencies - reusable template
.install_dependencies: &install_dependencies
  before_script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.cargo/bin:$PATH"
    - uv python install 3.12
    - uv sync --extra dev

# Linting job
lint:
  stage: quality
  <<: *install_dependencies
  script:
    - uv run ruff check src/ tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# Formatting check job
format:
  stage: quality
  <<: *install_dependencies
  script:
    - uv run ruff format --check src/ tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# Type checking job
typecheck:
  stage: quality
  <<: *install_dependencies
  script:
    - uv run mypy src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# Security scanning job
security:
  stage: quality
  <<: *install_dependencies
  script:
    - uv run bandit -c .bandit -r src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# Test job with coverage
test:
  stage: test
  <<: *install_dependencies
  script:
    - uv run pytest -v --cov=src/bugowner --cov-report=term --cov-report=xml --cov-fail-under=90
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
